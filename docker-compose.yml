services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-instagram_dm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD .env faylida berilishi shart}
      POSTGRES_DB: ${POSTGRES_DB:-instagram_dm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-instagram_dm} -d ${POSTGRES_DB:-instagram_dm}']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-instagram_dm}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-instagram_dm}
      JWT_SECRET: ${JWT_SECRET:?}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?}
      FRONTEND_URL: ${FRONTEND_URL:?}
      BACKEND_URL: ${BACKEND_URL:-}
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID:-}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET:-}
      INSTAGRAM_ACCESS_TOKEN: ${INSTAGRAM_ACCESS_TOKEN:-}
      INSTAGRAM_ACCOUNT_ID: ${INSTAGRAM_ACCOUNT_ID:-}
      INSTAGRAM_VERIFY_TOKEN: ${INSTAGRAM_VERIFY_TOKEN:-}
    ports:
      - '127.0.0.1:${BACKEND_PORT:-4000}:4000'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:4000/api/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '127.0.0.1:${FRONTEND_PORT:-3000}:3000'

volumes:
  postgres_data:
